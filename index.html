<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nhận diện thông minh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asimovian&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f4ff;
      font-family: "Asimovian", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 15%, rgba(59,130,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 85%, rgba(99,102,241,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Hidden canvas */
    #hidden-canvas { display: none; }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .back-btn {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid rgba(0,0,0,0.08);
      color: #94a3b8;
      font-family: "Asimovian", sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 99px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .back-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    .back-btn svg { width: 14px; height: 14px; }

    .header { text-align: center; }
    .header h1 {
      font-family: "Asimovian", sans-serif;
      font-size: 24px;
      font-weight: 400;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: #94a3b8; font-size: 13px; margin-top: 4px; }

    /* Main result card */
    .card {
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 40px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.1);
      border: 1px solid rgba(0,0,0,0.06);
      text-align: center;
    }

    .result-icon {
      font-size: 64px;
      line-height: 1;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .result-name {
      font-family: "Asimovian", sans-serif;
      font-size: 32px;
      font-weight: 400;
      color: #0f172a;
      min-height: 40px;
      transition: all 0.3s ease;
    }

    .prob-bar-wrap {
      width: 100%;
      background: #f1f5f9;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .prob-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      transition: width 0.4s ease;
      width: 0%;
    }

    .prob-text {
      font-size: 13px;
      color: #94a3b8;
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.4s infinite;
    }
    .dot.ready { background: #22c55e; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <a class="back-btn" href="https://sites.google.com/view/trngthcshunhthckhng/trang-ch%E1%BB%A7">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Trở lại
    </a>

    <div class="header">
      <h1>Nhận diện thông minh</h1>
      <p>Đang dùng camera để nhận diện</p>
    </div>

    <div class="card">
      <div class="result-icon" id="resultIcon">🔍</div>
      <div class="result-name" id="resultName">Đang khởi động...</div>
      <div class="prob-bar-wrap">
        <div class="prob-bar" id="probBar"></div>
      </div>
      <div class="prob-text" id="probText">—</div>
    </div>

    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Đang tải mô hình...</span>
    </div>
  </div>

  <!-- Hidden canvas for webcam -->
  <canvas id="hidden-canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/RX-fZy0iz/";

    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const resultIcon = document.getElementById("resultIcon");
    const resultName = document.getElementById("resultName");
    const probBar = document.getElementById("probBar");
    const probText = document.getElementById("probText");

    async function init() {
      try {
        const model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
        statusText.textContent = "Đang mở camera...";

        const webcam = new tmImage.Webcam(200, 200, true);
        await webcam.setup();
        await webcam.play();

        dot.classList.add("ready");
        statusText.textContent = "Đang nhận diện...";

        async function loop() {
          webcam.update();
          const preds = await model.predict(webcam.canvas);
          const best = preds.reduce((a, b) => a.probability > b.probability ? a : b);
          const pct = (best.probability * 100).toFixed(1);

          resultName.textContent = best.className;
          probBar.style.width = pct + "%";
          probText.textContent = "Độ tin cậy: " + pct + "%";
          resultIcon.textContent = getIcon(best.className);

          requestAnimationFrame(loop);
        }

        loop();
      } catch (e) {
        resultName.textContent = "Lỗi camera";
        resultIcon.textContent = "⚠️";
        statusText.textContent = e.message;
        console.error(e);
      }
    }

    // Map tên class sang emoji (tuỳ chỉnh theo model của bạn)
    function getIcon(name) {
      const map = {
        "Cat": "🐱", "Mèo": "🐱",
        "Dog": "🐶", "Chó": "🐶",
        "Person": "🧑", "Người": "🧑",
        "Car": "🚗", "Xe": "🚗",
        "None": "🚫", "Không có": "🚫",
      };
      return map[name] || "✅";
    }

    init();
  </script>
</body>
</html>
