<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Teachable Machine</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
      font-family: sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 24px;
      font-size: 28px;
      font-weight: bold;
      color: #1e1e2e;
    }
    #prob {
      font-size: 16px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <button onclick="init()">Bắt đầu</button>
    <div id="result">—</div>
    <div id="prob"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/RX-fZy0iz/";
    let model, webcam;

    async function init() {
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");
      webcam = new tmImage.Webcam(200, 200, true);
      await webcam.setup();
      await webcam.play();
      loop();
    }

    async function loop() {
      webcam.update();
      const best = (await model.predict(webcam.canvas))
        .reduce((a, b) => a.probability > b.probability ? a : b);
      document.getElementById("result").textContent = best.className;
      document.getElementById("prob").textContent = (best.probability * 100).toFixed(1) + "%";
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
